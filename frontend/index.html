<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        
        header, main, section { 
            background: #ffffff; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        
        h1 { font-size: 1.6rem; color: #1a73e8; text-align: center; }
        h2 { font-size: 1.2rem; margin-bottom: 15px; }
        
        .form-grupo { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        button { padding: 12px 20px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .item-tarefa { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px; 
            border-bottom: 1px solid #eee; 
        }
        .btn-deletar { background: #d93025; color: white; padding: 6px 12px; font-size: 0.9rem; border: none; border-radius: 4px; cursor: pointer; }

        @media (min-width: 768px) {
            body { max-width: 600px; margin: 40px auto; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Minhas Tarefas</h1>
    </header>

    <main>
        <section aria-label="Adicionar Nova Tarefa">
            <h2>Nova Tarefa</h2>
            <div class="form-grupo">
                <input type="text" id="input-tarefa" placeholder="O que precisa ser feito?">
                <button onclick="adicionarTarefa()">Adicionar</button>
            </div>
        </section>

        <section aria-label="Lista de Tarefas Cadastradas">
            <h2>Lista de Afazeres</h2>
            <div id="container-tarefas">
                </div>
        </section>
    </main>

    <script>
        const API_URL = "http://localhost:8000/tarefas";

        async function carregarTarefas() {
            const res = await fetch(API_URL);
            const tarefas = await res.json();
            const container = document.getElementById("container-tarefas");
            container.innerHTML = "";
            
            tarefas.forEach(t => {
                container.innerHTML += `
                    <div class="item-tarefa">
                        <span>${t.titulo}</span>
                        <button class="btn-deletar" onclick="deletarTarefa(${t.id})">Excluir</button>
                    </div>
                `;
            });
        }

        async function adicionarTarefa() {
            const input = document.getElementById("input-tarefa");
            if (!input.value.trim()) return;

            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ titulo: input.value })
            });
            input.value = "";
            carregarTarefas();
        }

        async function deletarTarefa(id) {
            await fetch(`${API_URL}/${id}`, { method: "DELETE" });
            carregarTarefas();
        }

        carregarTarefas();
    </script>
</body>
</html>
