<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        
        header, main, section { 
            background: #ffffff; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        
        h1 { font-size: 1.6rem; color: #1e3a8a; text-align: center; }
        h2 { font-size: 1.2rem; margin-bottom: 15px; }
        
        .form-grupo { display: flex; flex-direction: column; gap: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        button { padding: 12px 20px; background: #1e3a8a; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        
        .tabela-responsiva { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; }
        th { background-color: #f8fafc; color: #1e3a8a; }
        
        .btn-deletar { background: #d93025; color: white; padding: 6px 12px; font-size: 0.85rem; border: none; border-radius: 4px; cursor: pointer; }

        @media (min-width: 768px) {
            body { max-width: 700px; margin: 40px auto; }
            .form-linha { display: flex; gap: 10px; }
            button { width: auto; align-self: flex-end; height: 47px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>📦 Controle de Estoque</h1>
    </header>

    <main>
        <section aria-label="Cadastrar Novo Produto">
            <h2>Novo Produto</h2>
            <div class="form-grupo">
                <div class="form-linha">
                    <input type="text" id="prod-nome" placeholder="Nome do produto">
                    <input type="number" id="prod-qtd" placeholder="Qtd" min="0">
                    <input type="number" id="prod-preco" placeholder="Preço (R$)" step="0.01" min="0">
                </div>
                <button onclick="adicionarProduto()">Cadastrar</button>
            </div>
        </section>

        <section aria-label="Produtos em Estoque">
            <h2>Produtos Cadastrados</h2>
            <div class="tabela-responsiva">
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Qtd</th>
                            <th>Preço</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-produtos">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const API_URL = "http://localhost:8000/produtos";

        async function carregarProdutos() {
            const res = await fetch(API_URL);
            const produtos = await res.json();
            const tabela = document.getElementById("lista-produtos");
            tabela.innerHTML = "";
            
            produtos.forEach(p => {
                tabela.innerHTML += `
                    <tr>
                        <td><strong>${p.nome}</strong></td>
                        <td>${p.quantidade}</td>
                        <td>R$ ${p.preco.toFixed(2)}</td>
                        <td><button class="btn-deletar" onclick="deletarProduto(${p.id})">Excluir</button></td>
                    </tr>
                `;
            });
        }

        async function adicionarProduto() {
            const nome = document.getElementById("prod-nome").value;
            const qtd = document.getElementById("prod-qtd").value;
            const preco = document.getElementById("prod-preco").value;

            if (!nome.trim() || qtd === "" || preco === "") return;

            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    nome: nome,
                    quantidade: parseInt(qtd),
                    preco: parseFloat(preco)
                })
            });

            document.getElementById("prod-nome").value = "";
            document.getElementById("prod-qtd").value = "";
            document.getElementById("prod-preco").value = "";

            carregarProdutos();
        }

        async function deletarProduto(id) {
            await fetch(`${API_URL}/${id}`, { method: "DELETE" });
            carregarProdutos();
        }

        carregarProdutos();
    </script>
</body>
</html>
